{% extends 'base/base.html' %}
{% block content %}
<style>
  .signup-wrap {
    min-height: 80vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: linear-gradient(135deg, #f0f7ff 0%, #fff 60%);
    padding: 2rem 1rem;
  }
  .signup-card {
    background: #fff;
    border-radius: 20px;
    box-shadow: 0 8px 40px rgba(0,100,255,0.10);
    padding: 2.5rem 2rem;
    width: 100%;
    max-width: 420px;
  }
</style>
<div class="signup-wrap">
  <div class="signup-card">
    <h4 class="text-center fw-bold mb-1">Finaliser l'inscription</h4>
    <p class="text-center text-muted small mb-4">Votre compte Google est prêt !</p>

    <form method="post" action="{% url 'socialaccount_signup' %}">
      {% csrf_token %}
      {{ form.as_p }}
      <button type="submit" class="btn btn-primary w-100"
              style="border-radius:10px; padding:0.8rem; font-weight:600;">
        ✓ Créer mon compte ShopDjango
      </button>
    </form>
    <a href="{% url 'users:login' %}" class="d-block text-center text-muted small mt-3">
      ← Retour
    </a>
  </div>
</div>
{% endblock %}
