        <p class="text-secondary small mb-3">Réponse immédiate</p>

        <p class="text-secondary small mb-2">Disponible 24h/24</p>
        <a href="tel:+23562401454" class="btn btn-success btn-sm mb-2">
          <i class="bi bi-telephone me-1"></i>62 40 14 54
        </a>
        <a href="tel:+23599741086" class="btn btn-outline-success btn-sm">
          <i class="bi bi-telephone me-1"></i>99 74 10 86
        </a>
      </div>
    </div>

    <div class="col-md-4">
      <div class="card text-center p-4 border-0 shadow-sm h-100">
        <i class="bi bi-envelope-fill fs-1 text-warning"></i>
        <h5 class="mt-2">Email</h5>
        <p class="text-secondary small mb-3">Réponse sous 24h</p>
        <a href="mailto:benmaharip.com" class="btn btn-warning btn-sm">
          <i class="bi bi-envelope me-1"></i>Envoyer un email
        </a>
      </div>
    </div>

  </div>
</div>
{% endblock %}
