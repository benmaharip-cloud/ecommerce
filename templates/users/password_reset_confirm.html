{% extends 'base/base.html' %}
{% block content %}
<div class="container py-5">
  <div class="card shadow-sm mx-auto" style="max-width:450px; border-radius:16px; padding:2rem;">
    <h4 class="fw-bold text-center mb-4">🔒 Nouveau mot de passe</h4>
    <form method="post">
      {% csrf_token %}
      <div class="form-floating mb-3">
        <input type="password" name="new_password1" class="form-control" placeholder="Nouveau mot de passe" style="border-radius:10px;">
        <label>Nouveau mot de passe</label>
      </div>
      <div class="form-floating mb-3">
        <input type="password" name="new_password2" class="form-control" placeholder="Confirmer" style="border-radius:10px;">
        <label>Confirmer le mot de passe</label>
      </div>
      <button type="submit" class="btn btn-primary w-100" style="border-radius:10px; padding:0.8rem;">
        ✓ Réinitialiser
      </button>
    </form>
  </div>
</div>
{% endblock %}
