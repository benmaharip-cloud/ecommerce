{% extends 'base/base.html' %}
{% block content %}
<div class="container py-5 text-center">
  <div class="card shadow-sm mx-auto" style="max-width:450px; border-radius:16px; padding:2rem;">
    <i class="bi bi-envelope-check fs-1 text-success"></i>
    <h4 class="mt-3 fw-bold">Email envoyé !</h4>
    <p class="text-muted">Vérifiez votre boîte mail et cliquez sur le lien pour réinitialiser votre mot de passe.</p>
    <a href="{% url 'users:login' %}" class="btn btn-primary mt-2" style="border-radius:10px;">
      Retour à la connexion
    </a>
  </div>
</div>
{% endblock %}
