{% extends "base/base.html" %}
{% block title %}Mot de passe oublie — ShopDjango{% endblock %}
{% block content %}
<div class="container" style="max-width:450px;">
  <div class="card border-0 shadow-sm mt-5">
    <div class="card-body p-4">
      <div class="text-center mb-4">
        <i class="bi bi-lock-fill text-primary" style="font-size:50px;"></i>
        <h3 class="fw-bold mt-2">Mot de passe oublie ?</h3>
        <p class="text-muted">Entrez votre email et nous vous enverrons un lien de reinitialisation.</p>
      </div>
      <form method="post">
        {% csrf_token %}
        <div class="mb-3">
          <label class="form-label fw-semibold">Adresse email</label>
          <input type="email" name="email" class="form-control form-control-lg" placeholder="votre@email.com" required autofocus>
        </div>
        <button type="submit" class="btn btn-primary w-100 btn-lg">
          <i class="bi bi-send me-2"></i>Envoyer le lien
        </button>
        <div class="text-center mt-3">
          <a href="/compte/connexion/" class="text-muted small">Retour a la connexion</a>
        </div>
      </form>
    </div>
  </div>
</div>
{% endblock %}
